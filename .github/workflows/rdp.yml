name: RDP Bore Tunnel v4 (Chống Sập Khi Kết Nối)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP & User
        run: |
          Write-Host "--- Đang cấu hình hệ thống RDP ---" -ForegroundColor Cyan
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Tạo User
          $Password = ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force
          New-LocalUser "DucthengTechDz" -Password $Password
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "DucthengTechDz"
          Add-LocalGroupMember -Group "Administrators" -Member "DucthengTechDz"
          
          # Tối ưu Registry cho RDP
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableVirtualizedGraphics" -Value 1 -Type DWord -Force

      - name: Install & Start Bore Tunnel
        run: |
          Write-Host "--- Tải Bore CLI ---" -ForegroundColor Cyan
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath . -Force
          
          Write-Host "--- Đợi RDP Local sẵn sàng (Cổng 3389) ---" -ForegroundColor Yellow
          while (!(Test-NetConnection localhost -Port 3389 -WarningAction SilentlyContinue).TcpTestSucceeded) {
              Start-Sleep -Seconds 2
          }
          Write-Host "RDP Local đã sống!" -ForegroundColor Green

          # Địa chỉ máy GCP của đại ca
          $SERVER_IP = "34.46.25.187"
          $SECRET = "TrueHieuDz"
          
          Write-Host "--- Khởi chạy Bore Tunnel ---" -ForegroundColor Cyan
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to $SERVER_IP --secret $SECRET --to-host 127.0.0.1" -WindowStyle Hidden -RedirectStandardOutput "bore_log.txt" -RedirectStandardError "bore_err.txt"
          
          Start-Sleep -Seconds 15
          $boreLog = Get-Content "bore_log.txt" -Raw
          $regex = "listening at ([\d\.]+:[\d]+)"
          
          if ($boreLog -match $regex) {
              $rdpAddress = $matches[1]
              Write-Host "===> THÀNH CÔNG! ĐỊA CHỈ: $rdpAddress" -ForegroundColor Green
              "IP/ADDRESS: $rdpAddress`nUSER: DucthengTechDz`nPASS: W1nd0ws-P4ssw0rd-2025!" | Out-File -FilePath rdp-info.txt
              
              # Đẩy info lên GitHub
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add rdp-info.txt
              git commit -m "RDP Info: $rdpAddress"
              git push
          } else {
              Write-Host "Lỗi: Không lấy được Port từ Bore Server!" -ForegroundColor Red
              Get-Content "bore_log.txt"
          }

      - name: Keep Alive & Real-time Monitor
        run: |
          Write-Host "--- Tunnel đang hoạt động. Đang theo dõi log ---" -ForegroundColor Magenta
          $lastLog = ""
          while($true) {
              if (Test-Path "bore_log.txt") {
                  $currentLog = Get-Content "bore_log.txt" -Tail 1
                  if ($currentLog -ne $lastLog) {
                      Write-Host "[$(Get-Date -Format 'HH:mm:ss')] $currentLog"
                      $lastLog = $currentLog
                  }
              }
              Start-Sleep -Seconds 10
          }
