name: Web VNC Bore Tunnel v2 (noVNC Direct Web)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup VNC Server (TightVNC)
        run: |
          Write-Host "--- Cài đặt và cấu hình TightVNC ---" -ForegroundColor Cyan
          
          # 1. Cài đặt TightVNC
          choco install tightvnc -y
          
          # 2. Tạo User Windows dự phòng
          $userName = "DucthengTechDz"
          if (!(Get-LocalUser -Name $userName -ErrorAction SilentlyContinue)) {
              $Password = ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force
              New-LocalUser $userName -Password $Password -Description "Web VNC Account"
              Add-LocalGroupMember -Group "Administrators" -Member $userName
          }
          
          # 3. Cấu hình VNC qua Registry (Tắt Auth để vào web bấm Connect là ăn luôn)
          $vncRegPath = "HKLM:\SOFTWARE\TightVNC\Server"
          if (!(Test-Path $vncRegPath)) { New-Item -Path $vncRegPath -Force -Recurse }
          
          Set-ItemProperty -Path $vncRegPath -Name "UseVncAuthentication" -Value 0 -Type DWORD
          Set-ItemProperty -Path $vncRegPath -Name "RfbPort" -Value 5900 -Type DWORD
          
          # 4. Khởi động lại dịch vụ VNC
          Restart-Service -Name "tvnserver" -Force
          netsh advfirewall firewall add rule name="VNC Server" dir=in action=allow protocol=TCP localport=5900

      - name: Setup noVNC & Websockify (Trạm trung chuyển lên Web)
        run: |
          Write-Host "--- Tải noVNC và cấu hình Websockify ---" -ForegroundColor Cyan
          
          # Tải noVNC
          git clone https://github.com/novnc/noVNC.git
          
          # Cài đặt websockify qua Python (Python đã có sẵn trên windows-latest)
          pip install websockify
          
          # Mở Firewall cổng 6080 cho Web VNC
          netsh advfirewall firewall add rule name="Web VNC" dir=in action=allow protocol=TCP localport=6080
          
          # Khởi chạy Websockify ngầm, kết nối thư mục Web của noVNC với cổng 5900
          Start-Process -FilePath "python" -ArgumentList "-m websockify --web .\noVNC 6080 localhost:5900" -WindowStyle Hidden -RedirectStandardOutput "websockify_log.txt" -RedirectStandardError "websockify_err.txt"
          
          # Chờ noVNC lên sóng
          while (!(Test-NetConnection localhost -Port 6080 -WarningAction SilentlyContinue).TcpTestSucceeded) { 
              Write-Host "Đang đợi giao diện Web noVNC khởi động..."
              Start-Sleep -Seconds 2 
          }

      - name: Start Bore Client for Web VNC
        run: |
          Write-Host "--- Tải & Khởi chạy Bore Client ---" -ForegroundColor Cyan
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath . -Force
          
          # Khởi chạy tunnel ngầm cổng 6080 qua Public Bore (bore.pub)
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 6080 --to bore.pub" -WindowStyle Hidden -RedirectStandardOutput "bore_log.txt" -RedirectStandardError "bore_err.txt"
          
          # Chờ Bore lấy Port
          Start-Sleep -Seconds 20
          $boreLog = Get-Content "bore_log.txt" -Raw
          
          if ($boreLog -match "listening at ([a-zA-Z0-9\.\-]+:\d+)") {
              $webDomain = $matches[1]
              $webUrl = "http://$webDomain/vnc.html"
              
              Write-Host "==========================================" -ForegroundColor Green
              Write-Host "===> TRUY CẬP WEB VNC TẠI: $webUrl" -ForegroundColor Green
              Write-Host "==========================================" -ForegroundColor Green
              
              "URL: $webUrl`nLưu ý: Mở link trên trình duyệt, bấm nút 'Connect' là vào thẳng máy!" | Out-File -FilePath vnc-web-info.txt
              
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add vnc-web-info.txt; git commit -m "Update Web VNC URL: $webUrl"; git push
          } else {
              Write-Host "Không tìm thấy Port trong log. Nội dung log:" -ForegroundColor Red
              Get-Content "bore_log.txt"
          }

      - name: Keep Alive & Log Monitoring
        run: |
          Write-Host "--- Trực tiếp Web VNC đang hoạt động ổn định ---" -ForegroundColor Magenta
          $lastLog = ""
          while($true) {
              if (Test-Path "bore_log.txt") {
                  $currentLog = Get-Content "bore_log.txt" -Tail 1
                  if ($currentLog -ne $lastLog) {
                      Write-Host "[$(Get-Date -Format 'HH:mm:ss')] BORE: $currentLog"
                      $lastLog = $currentLog
                  }
              }
              Start-Sleep -Seconds 10
          }
