name: RDP Bore Tunnel v5 (Final Fix - Chống Sập)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP & Anti-Disconnect
        run: |
          Write-Host "--- Cấu hình RDP Chống Sập ---" -ForegroundColor Cyan
          # Bật RDP và tắt NLA (Xác thực mạng) để tunnel dễ kết nối hơn
          (Get-WmiObject -class "Win32_TSGeneralSetting" -Namespace root\cimv2\terminalservices -Filter "TerminalName='RDP-Tcp'").SetUserAuthenticationRequired(0)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          
          # Ép RDP chỉ dùng TCP (Bore không hỗ trợ UDP, dùng UDP sẽ gây sập tunnel)
          New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" -Name "SelectNetworkDetect" -Value 0 -PropertyType DWORD -Force
          
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Tạo User
          $Password = ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force
          New-LocalUser "DucthengTechDz" -Password $Password
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "DucthengTechDz"
          Add-LocalGroupMember -Group "Administrators" -Member "DucthengTechDz"

      - name: Start Bore Client
        run: |
          Write-Host "--- Tải & Chạy Bore Client ---" -ForegroundColor Cyan
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath . -Force
          
          # Đợi RDP Local sống hẳn
          while (!(Test-NetConnection localhost -Port 3389 -WarningAction SilentlyContinue).TcpTestSucceeded) { Start-Sleep -Seconds 2 }

          $SERVER_IP = "34.46.25.187"
          $SECRET = "TrueHieuDz"
          
          # Chạy Bore với tham số tối ưu
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to $SERVER_IP --secret $SECRET --to-host 127.0.0.1" -WindowStyle Hidden -RedirectStandardOutput "bore_log.txt" -RedirectStandardError "bore_err.txt"
          
          Start-Sleep -Seconds 20
          $boreLog = Get-Content "bore_log.txt" -Raw
          if ($boreLog -match "listening at ([\d\.]+:[\d]+)") {
              $rdpAddress = $matches[1]
              Write-Host "===> ADDRESS: $rdpAddress" -ForegroundColor Green
              "IP: $rdpAddress`nUSER: DucthengTechDz`nPASS: W1nd0ws-P4ssw0rd-2025!" | Out-File -FilePath rdp-info.txt
              
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add rdp-info.txt; git commit -m "Update RDP: $rdpAddress"; git push
          } else {
              Write-Host "Log Bore hiện tại:"
              Get-Content "bore_log.txt"
          }

      - name: Keep Alive & Monitor
        run: |
          Write-Host "--- Tunnel đang chạy. Đừng tắt cửa sổ này! ---" -ForegroundColor Magenta
          $lastLog = ""
          while($true) {
              if (Test-Path "bore_log.txt") {
                  $currentLog = Get-Content "bore_log.txt" -Tail 1
                  if ($currentLog -ne $lastLog) {
                      Write-Host "[$(Get-Date -Format 'HH:mm:ss')] $currentLog"
                      $lastLog = $currentLog
                  }
              }
              # Giữ cho tiến trình luôn hoạt động
              Start-Sleep -Seconds 10
          }
