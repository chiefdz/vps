name: RDP Zrok.io Tunnel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1450 # Cắm VPS tối đa 24h

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup RDP & Create User
        run: |
          # Bật RDP và tạo User
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-LocalUser "DucthengTechDz" -Password (ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force)
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "DucthengTechDz"
          Add-LocalGroupMember -Group "Administrators" -Member "DucthengTechDz"
          
          # Tối ưu hóa đồ họa RDP
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableVirtualizedGraphics" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "AVCHardwareEncodePreferred" -Value 1 -Type DWord -Force
          powercfg /setactive a1841308-3541-4fab-bc81-f71556f20b4a
          
      - name: Install and Start Zrok
        run: |
          Write-Host "Đang tải bản phát hành Zrok mới nhất..."
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/openziti/zrok/releases/latest"
          $downloadUrl = ($release.assets | Where-Object { $_.name -match "windows_amd64.tar.gz" }).browser_download_url
          Invoke-WebRequest -Uri $downloadUrl -OutFile "zrok.tar.gz"
          
          # Giải nén
          tar -xf zrok.tar.gz
          
          Write-Host "Đang kích hoạt môi trường Zrok bằng Token..."
          .\zrok.exe enable FUvcQMZdEKaS
          
          Write-Host "Khởi chạy Zrok TCP Tunnel cho Port 3389..."
          echo ".\zrok.exe share public localhost:3389 --backend-mode tcp" > run_zrok.bat
          Start-Process -FilePath "run_zrok.bat" -WindowStyle Hidden
          
          Write-Host "==================================================="
          Write-Host "Zrok TCP Tunnel đã chạy thành công!"
          Write-Host "Bạn hãy vào Zrok Dashboard (zrok.io) để lấy URL và Port truy cập RDP nhé!"
          Write-Host "User: DucthengTechDz | Pass: W1nd0ws-P4ssw0rd-2025!"
          Write-Host "==================================================="
          
      - name: Keep VPS Alive (24h)
        run: |
          Start-Sleep -Seconds 86400
