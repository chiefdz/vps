name: RDP Bore Tunnel v3 (Full Fix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP & User
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $Password = ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force
          New-LocalUser "DucthengTechDz" -Password $Password
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "DucthengTechDz"
          Add-LocalGroupMember -Group "Administrators" -Member "DucthengTechDz"

      - name: Start Bore Client
        run: |
          # Tải Bore
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath . -Force
          
          # Địa chỉ máy GCP của đại ca
          $SERVER_IP = "34.46.25.187"
          
          Write-Host "Đang kết nối tới Server GCP..."
          # Chạy Client với Secret và bắt buộc host local
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to $SERVER_IP --secret TrueHieuDz" -WindowStyle Hidden -RedirectStandardOutput "bore_log.txt"
          
          # Chờ 20s để lấy Port
          Start-Sleep -Seconds 20
          $boreLog = Get-Content "bore_log.txt" -Raw
          if ($boreLog -match "listening at ([\d\.]+:[\d]+)") {
              $rdpAddress = $matches[1]
              Write-Host "===> OK! RDP ADDRESS: $rdpAddress" -ForegroundColor Green
              "RDP_ADDRESS=$rdpAddress" | Out-File -FilePath rdp-info.txt
          }
          
          # Đẩy info lên GitHub
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rdp-info.txt
          git commit -m "Update RDP: $rdpAddress"
          git push

      - name: Keep Alive & Log Output
        run: |
          Write-Host "Tunnel đang chạy. Đang duy trì kết nối..." -ForegroundColor Magenta
          $i = 0
          while($true) {
              $i++
              $time = Get-Date -Format "HH:mm:ss"
              Write-Host "[$time] Tunnel vẫn sống - Đã chạy được $i phút."
              # In log mới nhất của bore để debug nếu cần
              Get-Content "bore_log.txt" -Tail 1
              Start-Sleep -Seconds 60
          }
